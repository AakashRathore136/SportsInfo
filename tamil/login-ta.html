<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>உள்நுழைவு - SportsInfo</title>
    <link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body>
    <div class="animated-bg"></div>
    <div class="page-wrapper">
        <nav class="navbar">
            <div class="nav-left">
                <a href="../index.html" class="lang-selector">
                    <span class="lang-icon">🌐</span>
                    <span class="lang-text">மொழியை மாற்று</span>
                </a>
            </div>
            <div class="nav-right">
                <a href="about-ta.html" class="nav-link">எங்களைப் பற்றி</a>
            </div>
        </nav>
        <section class="hero-section">
            <div class="form-container">
                <h2 class="form-title">வரவேற்கிறோம்</h2>
                <p class="form-subtitle">உங்கள் விளையாட்டு கற்றல் பயணத்தைத் தொடர உள்நுழையவும்</p>
                <form action="sports-selection-ta.html">
                    <div class="form-group">
                        <label class="form-label" for="email">மின்னஞ்சல் முகவரி</label>
                        <input type="email" id="email" class="form-input" placeholder="உங்கள் மின்னஞ்சலை உள்ளிடவும்" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="password">கடவுச்சொல்</label>
                        <input type="password" id="password" class="form-input" placeholder="உங்கள் கடவுச்சொல்லை உள்ளிடவும்" required>
                    </div>
                    <div class="form-group">
                        <label class="form-checkbox">
                            <input type="checkbox">
                            <span>என்னை நினைவில் வைத்துக்கொள்</span>
                        </label>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">உள்நுழையவும்</button>
                    <p style="text-align: center; margin-top: 1.5rem; color: rgba(255,255,255,0.6);">
                        கணக்கு இல்லையா? 
                        <a href="register-ta.html" style="color: var(--accent-gold); text-decoration: none;">இப்போது பதிவு செய்யவும்</a>
                    </p>
                </form>
            </div>
        </section>
        <footer class="footer">
            <div class="footer-bottom">
                <p>&copy; 2024 SportsInfo. அனைத்து உரிமைகளும் reserved.</p>
            </div>
        </footer>
    </div>
    <a href="feedback-ta.html" class="feedback-btn" title="கருத்து தெரிவிக்கவும்">💬</a>
    <script src="../assets/js/main.js"></script>
    <script src="../assets/js/script.js"></script>
    <script>
        // Login form validation
        document.querySelector('form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email');
            const password = document.getElementById('password');
            let isValid = true;
            
            // Email validation
            const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!email.value.trim()) {
                alert('தயவுசெய்து உங்கள் மின்னஞ்சல் முகவரியை உள்ளிடவும்');
                email.focus();
                isValid = false;
            } else if (!emailPattern.test(email.value)) {
                alert('தயவுசெய்து செல்லுபடியாகும் மின்னஞ்சல் முகவரியை உள்ளிடவும்');
                email.focus();
                isValid = false;
            }
            
            // Password validation
            if (isValid && !password.value) {
                alert('தயவுசெய்து உங்கள் கடவுச்சொல்லை உள்ளிடவும்');
                password.focus();
                isValid = false;
            } else if (isValid && password.value.length < 6) {
                alert('கடவுச்சொல் குறைந்தது 6 எழுத்துகள் நீளமாக இருக்க வேண்டும்');
                password.focus();
                isValid = false;
            }
            
            if (isValid) {
                this.submit();
            }
        });
    </script>
</body>
</html>
