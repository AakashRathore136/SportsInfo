<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>पंजीकरण - SportsInfo</title>
    <link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body>
    <div class="animated-bg"></div>
    <div class="page-wrapper">
        <nav class="navbar">
            <div class="nav-left">
                <a href="../index.html" class="lang-selector">
                    <span class="lang-icon">🌐</span>
                    <span class="lang-text">भाषा बदलें</span>
                </a>
            </div>
            <div class="nav-right">
                <a href="about-hi.html" class="nav-link">हमारे बारे में</a>
            </div>
        </nav>
        <section class="section" style="padding-top: 8rem;">
            <div class="container">
                <h1 class="section-title">पाठ्यक्रम पंजीकरण</h1>
                <p class="section-subtitle">हजारों खेल प्रेमियों में शामिल हों और आज ही अपनी सीखने की यात्रा शुरू करें</p>
                <div class="form-container" style="max-width: 700px;">
                    <form action="sports-selection-hi.html">
                        <h3 style="color: var(--accent-gold); margin-bottom: 1.5rem;">व्यक्तिगत जानकारी</h3>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                            <div class="form-group">
                                <label class="form-label" for="firstName">पहला नाम</label>
                                <input type="text" id="firstName" class="form-input" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label" for="lastName">अंतिम नाम</label>
                                <input type="text" id="lastName" class="form-input" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="regEmail">ईमेल पता</label>
                            <input type="email" id="regEmail" class="form-input" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="phone">फोन नंबर</label>
                            <input type="tel" id="phone" class="form-input">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="regPassword">पासवर्ड बनाएं</label>
                            <input type="password" id="regPassword" class="form-input" required>
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label" for="profilePic">प्रोफाइल चित्र (वैकल्पिक)</label>
                            <input type="file" id="profilePic" class="form-input" accept="image/*">
                            <small style="color: #999; display: block; margin-top: 0.5rem;">स्वीकृत प्रारूप: JPG, PNG, GIF (अधिकतम 5MB)</small>
                        </div>
                        
                        <div class="form-group">
                            <label class="form-checkbox">
                                <input type="checkbox" required>
                                <span>मैं सेवा की शर्तों और गोपनीयता नीति से सहमत हूं</span>
                            </label>
                        </div>
                        <button type="submit" class="btn btn-primary" style="width: 100%;">खाता बनाएं और नामांकन करें</button>
                        <p style="text-align: center; margin-top: 1.5rem; color: rgba(255,255,255,0.6);">
                            पहले से खाता है? 
                            <a href="login-hi.html" style="color: var(--accent-gold); text-decoration: none;">साइन इन करें</a>
                        </p>
                    </form>
                </div>
            </div>
        </section>
        <footer class="footer">
            <div class="footer-bottom">
                <p>&copy; 2024 SportsInfo. सर्वाधिकार सुरक्षित।</p>
            </div>
        </footer>
    </div>
    <a href="feedback-hi.html" class="feedback-btn" title="फीडबैक दें">💬</a>
    <script src="../assets/js/main.js"></script>
    <script src="../assets/js/script.js"></script>
    <script>
        // Registration form validation
        document.querySelector('form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const firstName = document.getElementById('firstName');
            const lastName = document.getElementById('lastName');
            const email = document.getElementById('regEmail');
            const phone = document.getElementById('phone');
            const password = document.getElementById('regPassword');
            const profilePic = document.getElementById('profilePic');
            const terms = document.querySelector('input[type="checkbox"]');
            let isValid = true;
            
            // First name validation
            if (!firstName.value.trim()) {
                alert('कृपया अपना पहला नाम दर्ज करें');
                firstName.focus();
                isValid = false;
            } else if (firstName.value.trim().length < 2) {
                alert('पहला नाम कम से कम 2 अक्षर लंबा होना चाहिए');
                firstName.focus();
                isValid = false;
            }
            
            // Last name validation
            if (isValid && !lastName.value.trim()) {
                alert('कृपया अपना अंतिम नाम दर्ज करें');
                lastName.focus();
                isValid = false;
            } else if (isValid && lastName.value.trim().length < 2) {
                alert('अंतिम नाम कम से कम 2 अक्षर लंबा होना चाहिए');
                lastName.focus();
                isValid = false;
            }
            
            // Email validation
            const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (isValid && !email.value.trim()) {
                alert('कृपया अपना ईमेल पता दर्ज करें');
                email.focus();
                isValid = false;
            } else if (isValid && !emailPattern.test(email.value)) {
                alert('कृपया एक मान्य ईमेल पता दर्ज करें');
                email.focus();
                isValid = false;
            }
            
            // Phone validation (optional but if provided should be valid)
            if (isValid && phone.value.trim()) {
                const phonePattern = /^[\d\s\-\+\(\)]+$/;
                if (!phonePattern.test(phone.value) || phone.value.replace(/\D/g, '').length < 10) {
                    alert('कृपया एक मान्य फोन नंबर दर्ज करें (कम से कम 10 अंक)');
                    phone.focus();
                    isValid = false;
                }
            }
            
            // Password validation - Strong password requirements
            const strongPasswordPattern = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}$/;
            
            if (isValid && !password.value) {
                alert('कृपया एक पासवर्ड बनाएं');
                password.focus();
                isValid = false;
            } else if (isValid && !strongPasswordPattern.test(password.value)) {
                alert('पासवर्ड में होना चाहिए:\n- कम से कम 8 वर्ण\n- एक बड़ा अक्षर (A-Z)\n- एक छोटा अक्षर (a-z)\n- एक संख्या (0-9)\n- एक विशेष वर्ण (@$!%*?&)');
                password.focus();
                isValid = false;
            }
            
            // Profile picture validation (optional but if provided should be valid)
            if (isValid && profilePic.files.length > 0) {
                const file = profilePic.files[0];
                const validTypes = ['image/jpeg', 'image/png', 'image/gif'];
                const maxSize = 5 * 1024 * 1024; // 5MB
                
                if (!validTypes.includes(file.type)) {
                    alert('कृपया एक मान्य छवि फ़ाइल अपलोड करें (JPG, PNG, या GIF)');
                    profilePic.focus();
                    isValid = false;
                } else if (file.size > maxSize) {
                    alert('प्रोफाइल चित्र 5MB से कम का होना चाहिए');
                    profilePic.focus();
                    isValid = false;
                }
            }
            
            // Terms and conditions validation
            if (isValid && !terms.checked) {
                alert('कृपया सेवा की शर्तों और गोपनीयता नीति से सहमत हों');
                terms.focus();
                isValid = false;
            }
            
            if (isValid) {
                this.submit();
            }
        });
    </script>
</body>
</html>
