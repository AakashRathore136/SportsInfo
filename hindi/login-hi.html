<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>लॉगिन - SportsInfo</title>
    <link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body>
    <div class="animated-bg"></div>
    <div class="page-wrapper">
        <nav class="navbar">
            <div class="nav-left">
                <a href="../index.html" class="lang-selector">
                    <span class="lang-icon">🌐</span>
                    <span class="lang-text">भाषा बदलें</span>
                </a>
            </div>
            <div class="nav-right">
                <a href="about-hi.html" class="nav-link">हमारे बारे में</a>
            </div>
        </nav>
        <section class="hero-section">
            <div class="form-container">
                <h2 class="form-title">स्वागत है</h2>
                <p class="form-subtitle">अपनी खेल सीखने की यात्रा जारी रखने के लिए साइन इन करें</p>
                <form action="sports-selection-hi.html">
                    <div class="form-group">
                        <label class="form-label" for="email">ईमेल पता</label>
                        <input type="email" id="email" class="form-input" placeholder="अपना ईमेल दर्ज करें" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="password">पासवर्ड</label>
                        <input type="password" id="password" class="form-input" placeholder="अपना पासवर्ड दर्ज करें" required>
                    </div>
                    <div class="form-group">
                        <label class="form-checkbox">
                            <input type="checkbox">
                            <span>मुझे याद रखें</span>
                        </label>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">साइन इन करें</button>
                    <p style="text-align: center; margin-top: 1.5rem; color: rgba(255,255,255,0.6);">
                        खाता नहीं है? 
                        <a href="register-hi.html" style="color: var(--accent-gold); text-decoration: none;">अभी पंजीकरण करें</a>
                    </p>
                </form>
            </div>
        </section>
        <footer class="footer">
            <div class="footer-bottom">
                <p>&copy; 2024 SportsInfo. सर्वाधिकार सुरक्षित।</p>
            </div>
        </footer>
    </div>
    <a href="feedback-hi.html" class="feedback-btn" title="फीडबैक दें">💬</a>
    <script src="../assets/js/main.js"></script>
    <script src="../assets/js/script.js"></script>
    <script>
        // Login form validation
        document.querySelector('form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email');
            const password = document.getElementById('password');
            let isValid = true;
            
            // Email validation
            const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!email.value.trim()) {
                alert('कृपया अपना ईमेल पता दर्ज करें');
                email.focus();
                isValid = false;
            } else if (!emailPattern.test(email.value)) {
                alert('कृपया एक मान्य ईमेल पता दर्ज करें');
                email.focus();
                isValid = false;
            }
            
            // Password validation
            if (isValid && !password.value) {
                alert('कृपया अपना पासवर्ड दर्ज करें');
                password.focus();
                isValid = false;
            } else if (isValid && password.value.length < 6) {
                alert('पासवर्ड कम से कम 6 अक्षर लंबा होना चाहिए');
                password.focus();
                isValid = false;
            }
            
            if (isValid) {
                this.submit();
            }
        });
    </script>
</body>
</html>
